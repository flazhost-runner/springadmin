<!DOCTYPE html>
<html lang="id"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/be/default/full-width}">
<head>
  <title>Register</title>
</head>
<body>
<div layout:fragment="content">

  <div class="w-full max-w-5xl tw-card overflow-hidden grid md:grid-cols-2 mx-auto">

    <!-- ===== Left panel: visual ===== -->
    <div class="hidden md:flex sidebar-gradient items-center justify-center p-10">
      <img class="max-w-full max-h-80 object-contain"
           th:src="${setting != null && setting.loginImage != null ? storageUrl.url(setting.loginImage) : '/public/images/login-default.png'}"
           alt="Register Image">
    </div>

    <!-- ===== Right panel: form ===== -->
    <div class="p-8 md:p-12 flex flex-col justify-center">

      <!-- Logo -->
      <div class="mb-8 text-center">
        <img class="h-14 mx-auto object-contain"
             th:src="${setting != null && setting.icon != null ? storageUrl.url(setting.icon) : '/public/images/logo-default.png'}"
             alt="Logo">
      </div>

      <!-- Flash messages -->
      <div th:if="${flash_error}" class="alert alert-danger mb-4" th:text="${flash_error}"></div>
      <div th:if="${flash_success}" class="alert alert-success mb-4" th:text="${flash_success}"></div>

      <!-- Heading -->
      <div class="mb-6">
        <h2 class="text-2xl font-bold" style="color:var(--primary)">Create Account</h2>
        <p class="text-sm text-gray-500">Fill the form to register</p>
      </div>

      <!-- Register form -->
      <form method="POST" th:action="@{/auth/register}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
          <label for="name" class="form-label fw-semibold">Name</label>
          <input type="text" id="name" name="name"
                 class="form-control" placeholder="Full name"
                 autocomplete="name">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input type="email" id="email" name="email"
                 class="form-control" placeholder="Email address"
                 autocomplete="email">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" id="password" name="password"
                 class="form-control" placeholder="Password"
                 autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Create Account</button>
      </form>

      <hr class="my-4">
      <div class="text-center small">
        <a th:href="@{/auth/login}"
           class="text-decoration-none fw-semibold"
           style="color:var(--primary)">Already have an account?</a>
      </div>

    </div><!-- /.right panel -->
  </div><!-- /.grid -->

</div>
</body>
</html>
