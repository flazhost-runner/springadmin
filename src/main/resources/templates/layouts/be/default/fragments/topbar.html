<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--/* Topbar (Tailwind, themeable) */-->
<header th:fragment="topbar"
        class="tw-card !rounded-none md:!rounded-xl bg-white px-4 md:px-6 py-3 mb-6 flex items-center justify-between sticky top-0 z-20 shadow-sm">

    <div class="flex items-center gap-3">
        <!-- Hamburger (mobile) -->
        <button id="tw-sidebar-toggle"
                class="md:hidden text-2xl text-primary-tw"
                aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
        <!-- Home icon -->
        <a th:href="@{/admin/v1/dashboard}" class="text-primary-tw text-xl">
            <i class="fas fa-home"></i>
        </a>
    </div>

    <!-- User dropdown -->
    <div class="dropdown">
        <a class="flex items-center gap-2 no-underline cursor-pointer" href="#" data-toggle-dd>
            <span class="hidden lg:inline text-gray-500"
                  th:text="${'Welcome, ' + (currentUser != null ? currentUser.name : 'Admin')}">Welcome, Admin</span>
            <!-- Avatar: always an img — global error fallback in foot.html handles missing picture -->
            <img class="rounded-full"
                 style="width:38px;height:38px;object-fit:cover"
                 th:src="${currentUser != null and currentUser.picture != null
                           ? '/public/media/user/' + currentUser.picture
                           : ''}"
                 alt="user avatar">
            <i class="bi bi-gear" style="color:var(--primary)"></i>
        </a>
        <div class="dropdown-menu">
            <a class="dropdown-item" th:href="@{/admin/v1/profile}">
                <i class="fas fa-user fa-fw"></i> Profile
            </a>
            <div class="dropdown-divider"></div>
            <!-- Logout: POST form (security-safe, mirrors NodeAdmin) -->
            <a class="dropdown-item"
               href="#"
               onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                <i class="fas fa-sign-out-alt fa-fw"></i> Logout
            </a>
            <form id="logout-form"
                  th:action="@{/auth/logout}"
                  method="post"
                  style="display:none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </form>
        </div>
    </div>

</header>
</body>
</html>
