name: Build Check
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          provenance: false
