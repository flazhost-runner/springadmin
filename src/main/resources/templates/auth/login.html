<!DOCTYPE html>
<html lang="id"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/be/default/full-width}">
<head>
  <title>Login</title>
</head>
<body>
<div layout:fragment="content">

  <div class="w-full max-w-5xl tw-card overflow-hidden grid md:grid-cols-2 mx-auto">

    <!-- ===== Left panel: visual (sidebar-gradient) ===== -->
    <div class="hidden md:flex sidebar-gradient items-center justify-center p-10">
      <img class="max-w-full max-h-80 object-contain"
           src="/modules/setting/login-image.png"
           alt="Login Image">
    </div>

    <!-- ===== Right panel: form ===== -->
    <div class="p-8 md:p-12 flex flex-col justify-center">

      <!-- Logo -->
      <div class="mb-8 text-center">
        <img class="h-14 mx-auto object-contain"
             th:src="${setting != null && setting.icon != null ? '/uploads/' + setting.icon : '/public/images/logo-default.png'}"
             alt="Logo">
      </div>

      <!-- Flash error — path 1: single string (flash_error key) -->
      <div th:if="${flash_error}" class="alert alert-danger mb-4" th:text="${flash_error}"></div>

      <!-- Flash error — path 2: flash object with key=='error' -->
      <div th:if="${flash != null and flash.key == 'error'}" class="alert alert-danger mb-4"
           th:text="${flash.message}"></div>

      <!-- Flash error — path 3: errorMessages array -->
      <div th:if="${errorMessages != null and not #lists.isEmpty(errorMessages)}" class="alert alert-danger mb-4">
        <div th:each="msg : ${errorMessages}" th:text="${msg}"></div>
      </div>

      <!-- Flash success -->
      <div th:if="${flash_success}" class="alert alert-success mb-4" th:text="${flash_success}"></div>

      <!-- Spring Security error param -->
      <div th:if="${param.error}" class="alert alert-danger mb-4">
        Wrong email or password.
      </div>

      <!-- Heading -->
      <div class="mb-6">
        <h2 class="text-2xl font-bold" style="color:var(--primary)">Hello, Welcome Back!</h2>
        <p class="text-sm text-gray-500">Enter your credentials to continue</p>
      </div>

      <!-- Login form -->
      <form method="POST" th:action="@{/auth/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email</label>
          <input type="email" id="email" name="email"
                 class="form-control" placeholder="Email address">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" id="password" name="password"
                 class="form-control" placeholder="Password">
        </div>

        <button type="submit" class="btn btn-primary-tw w-100 py-2 mb-3">Login</button>

        <div class="d-flex justify-content-between small mb-3">
          <div>
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">Keep me logged in</label>
          </div>
          <a th:href="@{/auth/reset/req}"
             class="text-primary-tw text-decoration-none">Forgot password</a>
        </div>
      </form>

      <hr class="my-4">
      <div class="text-center small">
        <span class="text-gray-500">Don't have an account? </span>
        <a th:href="@{/auth/register}"
           class="text-primary-tw text-decoration-none fw-semibold">create here</a>
      </div>

    </div><!-- /.right panel -->
  </div><!-- /.grid -->

</div>
</body>
</html>
