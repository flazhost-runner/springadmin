<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/be/default/main}">
<head>
  <title>Create Role</title>
</head>
<body>
<div layout:fragment="content">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Role Management</h1>
  </div>

  <div class="tw-card p-6">
    <h2 class="text-lg font-bold mb-4" style="color:var(--primary)">Role Form</h2>

    <form method="post" th:action="@{/admin/v1/access/roles/store}" th:object="${form}">

      <!-- Name -->
      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Name</label>
        <input id="name" type="text" name="name"
               th:value="${form.name}"
               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback"
             th:errors="*{name}"></div>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label for="desc" class="form-label fw-semibold">Description</label>
        <input id="desc" type="text" name="desc"
               th:value="${form.desc}"
               th:classappend="${#fields.hasErrors('desc')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('desc')}" class="invalid-feedback"
             th:errors="*{desc}"></div>
      </div>

      <!-- Status -->
      <div class="mb-3">
        <label for="status" class="form-label fw-semibold">Status</label>
        <select id="status" name="status" required
                th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'"
                class="form-control">
          <option disabled th:selected="${form.status == null}">Select</option>
          <option value="Active"   th:selected="${form.status == 'Active'}">Active</option>
          <option value="Inactive" th:selected="${form.status == 'Inactive'}">Inactive</option>
        </select>
        <div th:if="${#fields.hasErrors('status')}" class="invalid-feedback"
             th:errors="*{status}"></div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary-tw px-4 py-2">
          <i class="fas fa-save me-1"></i> Save
        </button>
        <a th:href="@{/admin/v1/access/roles}" class="btn btn-danger px-4 py-2 text-white">Back</a>
      </div>

    </form>
  </div>

</div>
</body>
</html>
