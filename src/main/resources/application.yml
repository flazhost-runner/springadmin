spring:
  application:
    name: SpringAdmin

  # .env hasil scaffold xpose (APP_PORT + DB_*) ikut terbaca di dev lokal —
  # Spring tidak memuat .env secara native, import ini yang menjembatani.
  config:
    import: "optional:file:.env[.properties]"

  # Profil dari DB_TYPE: tanpa konfigurasi DB → `sqlite` (zero-config, paritas
  # NodeAdmin-family dev default). DB_TYPE=mysql/mariadb → profil tak dikenal =
  # konfigurasi dasar MySQL di bawah. Env SPRING_PROFILES_ACTIVE selalu menang
  # (entrypoint container men-set eksplisit; mode DB_URL-only → `default`).
  profiles:
    active: ${DB_TYPE:sqlite}

  mvc:
    hiddenmethod:
      filter:
        enabled: true

  # ---------------------------------------------------------------------------
  # Datasource — MySQL (DB_URL menang; tanpa DB_URL disusun dari DB_HOST/PORT/DATABASE)
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:springadmin}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: SpringAdminPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  # ---------------------------------------------------------------------------
  # Flyway
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # ---------------------------------------------------------------------------
  # Session — Redis-backed; TTL from SESSION_TTL_HOURS (default 6h)
  # ---------------------------------------------------------------------------
  session:
    store-type: redis
    timeout: ${SESSION_TTL_HOURS:6}h
    redis:
      namespace: springadmin:session

  # ---------------------------------------------------------------------------
  # Redis — supports REDIS_URL (redis://host:port) or individual REDIS_HOST/PORT
  # ---------------------------------------------------------------------------
  data:
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 8
          max-active: 16
          max-wait: 1000ms

  # ---------------------------------------------------------------------------
  # Thymeleaf
  # ---------------------------------------------------------------------------
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  # ---------------------------------------------------------------------------
  # Mail
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_SECURE:true}
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ---------------------------------------------------------------------------
  # Multipart file upload — max 2MB to match NodeAdmin standard
  # ---------------------------------------------------------------------------
  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 10MB
      file-size-threshold: 2KB

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server:
  port: ${APP_PORT:8006}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}
        max-age: 21600    # 6h in seconds — keep in sync with SESSION_TTL_HOURS default

# ---------------------------------------------------------------------------
# Custom application properties
# ---------------------------------------------------------------------------
app:
  name: ${APP_NAME:SpringAdmin}
  mode: ${APP_MODE:web}
  env: ${APP_ENV:development}
  url: ${APP_URL:http://localhost:8080}
  default-page-size: ${DEFAULT_PAGE_SIZE:10}

  session-secret: ${SESSION_SECRET:change-me-in-production-session-secret}

  jwt:
    secret: ${JWT_SECRET:change-me-in-production-jwt-secret-min-32-chars}
    expires-in: ${JWT_EXPIRES_IN:1h}
    algorithm: ${JWT_ALGORITHM:HS256}

  bcrypt:
    rounds: ${BCRYPT_ROUNDS:10}

  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:10}

  storage:
    root: ${STORAGE_ROOT:uploads}
    driver: ${STORAGE_DRIVER:local}
    access-key-id: ${STORAGE_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_SECRET_ACCESS_KEY:}
    endpoint: ${STORAGE_ENDPOINT:}
    bucket: ${STORAGE_BUCKET:}
    region: ${STORAGE_REGION:}
    ssl: ${STORAGE_SSL:true}

  upload:
    allowed-types: ${UPLOAD_ALLOWED_TYPES:image/jpeg,image/jpg,image/png,image/webp}
    max-size: ${UPLOAD_MAX_SIZE:2097152}    # 2 MB

  rate-limit:
    auth:
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
      refill-tokens: ${RATE_LIMIT_AUTH_REFILL_TOKENS:10}
      refill-period-seconds: ${RATE_LIMIT_AUTH_REFILL_PERIOD_SECONDS:900}    # 15 min
    otp:
      capacity: ${RATE_LIMIT_OTP_CAPACITY:5}
      refill-tokens: ${RATE_LIMIT_OTP_REFILL_TOKENS:5}
      refill-period-seconds: ${RATE_LIMIT_OTP_REFILL_PERIOD_SECONDS:900}    # 15 min
