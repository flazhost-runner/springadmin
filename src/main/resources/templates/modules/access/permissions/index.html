<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/be/default/main}">
<head>
  <title>Permission Management</title>
</head>
<body>
<div layout:fragment="content">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Permission Management</h1>
  </div>

  <div class="tw-card p-0 overflow-hidden">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="text-lg font-bold" style="color:var(--primary)">Permission List</h2>
      <div class="btn-group btn-sm">
        <a th:href="@{/admin/v1/access/permissions/create}" class="btn btn-success btn-sm">
          <i class="fas fa-fw fa-plus"></i> Add Data
        </a>
        <button type="submit" form="selection"
                th:formaction="@{/admin/v1/access/permissions/delete-selected}"
                data-confirm="Confirm Delete"
                class="btn btn-danger btn-sm">
          <i class="fas fa-fw fa-times"></i> Delete Selected
        </button>
      </div>
    </div>

    <div class="p-4" style="overflow-x:auto">
      <table class="table table-bordered table-hover align-middle">
        <thead>
          <form id="searchform" th:action="@{/admin/v1/access/permissions}" method="get">
            <tr>
              <th width="2%"></th>
              <th width="7%">
                <select name="q_page_size" id="q_page_size" class="form-control">
                  <option value="10"  th:selected="${filter['q_page_size'] == null or filter['q_page_size'] == 10}">10</option>
                  <option value="20"  th:selected="${filter['q_page_size'] == 20}">20</option>
                  <option value="50"  th:selected="${filter['q_page_size'] == 50}">50</option>
                  <option value="100" th:selected="${filter['q_page_size'] == 100}">100</option>
                </select>
              </th>
              <th width="18%">
                <input id="q_name" type="text" class="form-control" name="q_name"
                       th:value="${filter['q_name']}">
              </th>
              <th width="9%">
                <select name="q_guard" id="q_guard" class="form-control">
                  <option disabled th:selected="${filter['q_guard'] == null or filter['q_guard'] == ''}">Select</option>
                  <option value="web" th:selected="${filter['q_guard'] == 'web'}">web</option>
                  <option value="api" th:selected="${filter['q_guard'] == 'api'}">api</option>
                </select>
              </th>
              <th width="15%">
                <select name="q_method" id="q_method" class="form-control">
                  <option disabled th:selected="${filter['q_method'] == null}">Select</option>
                  <option value="GET"    th:selected="${filter['q_method'] == 'GET'}">GET</option>
                  <option value="POST"   th:selected="${filter['q_method'] == 'POST'}">POST</option>
                  <option value="PATCH"  th:selected="${filter['q_method'] == 'PATCH'}">PATCH</option>
                  <option value="PUT"    th:selected="${filter['q_method'] == 'PUT'}">PUT</option>
                  <option value="DELETE" th:selected="${filter['q_method'] == 'DELETE'}">DELETE</option>
                </select>
              </th>
              <th width="10%">
                <select name="q_status" id="q_status" class="form-control">
                  <option disabled th:selected="${filter['q_status'] == null}">Select</option>
                  <option value="Active"   th:selected="${filter['q_status'] == 'Active'}">Active</option>
                  <option value="Inactive" th:selected="${filter['q_status'] == 'Inactive'}">Inactive</option>
                </select>
              </th>
              <th width="15%">
                <input id="q_desc" type="text" class="form-control" name="q_desc"
                       th:value="${filter['q_desc']}">
              </th>
              <th width="5%" class="text-center align-middle">
                <div class="btn-group">
                  <button type="submit" form="searchform" class="btn btn-sm btn-success">
                    <i class="fas fa-fw fa-search"></i>
                  </button>
                  <a th:href="@{/admin/v1/access/permissions}" class="btn btn-sm btn-danger">
                    <i class="fas fa-fw fa-times"></i>
                  </a>
                </div>
              </th>
            </tr>
            <tr>
              <th width="5%"><input type="checkbox" id="checkall"/></th>
              <th width="5%">No</th>
              <th width="18%">Name</th>
              <th width="9%">Guard</th>
              <th width="15%">Method</th>
              <th width="10%">Status</th>
              <th width="15%">Description</th>
              <th width="5%">Action</th>
            </tr>
          </form>
        </thead>
        <tbody>
          <form id="selection" method="post" th:action="@{/admin/v1/access/permissions/delete-selected}">
            <tr th:each="data, iterStat : ${datas}">
              <td>
                <input name="selected[]" th:value="${data.id}" type="checkbox"/>
              </td>
              <td th:text="${iterStat.index + 1 + (paginate.pageSize * (paginate.currentPage - 1))}"></td>
              <td th:text="${data.name}"></td>
              <td>
                <span th:if="${data.guardName != null}"
                      class="badge text-bg-primary"
                      th:text="${data.guardName}"></span>
              </td>
              <td th:text="${data.method}"></td>
              <td class="text-left">
                <i th:if="${data.status == 'Active'}" class="fas fa-check-circle text-green-500 text-xl" title="Active"></i>
                <i th:unless="${data.status == 'Active'}" class="fas fa-times-circle text-red-500 text-xl" title="Inactive"></i>
              </td>
              <td th:text="${data.description}"></td>
              <td class="text-center">
                <div class="btn-group">
                  <button type="button" class="btn btn-sm btn-primary dropdown-toggle"
                          data-toggle-dd aria-expanded="false">Action</button>
                  <div class="dropdown-menu dropdown-menu-end">
                    <a th:href="@{/admin/v1/access/permissions/{id}/edit(id=${data.id})}"
                       class="dropdown-item">
                      <i class="fas fa-pen fa-fw"></i> Edit
                    </a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/admin/v1/access/permissions/{id}(id=${data.id})}"
                          method="post" class="m-0">
                      <input type="hidden" name="_method" value="DELETE"/>
                      <button type="submit" data-confirm="Confirm Delete"
                              class="dropdown-item danger">
                        <i class="fas fa-trash fa-fw"></i> Delete
                      </button>
                    </form>
                  </div>
                </div>
              </td>
            </tr>
          </form>
        </tbody>
      </table>

      <div class="d-flex justify-content-end mt-4">
        <nav>
          <ul class="pagination">
            <li th:if="${paginate.currentPage != 1}" class="page-item">
              <a class="page-link"
                 th:href="@{/admin/v1/access/permissions(q_page=${paginate.currentPage - 1}, q_page_size=${filter['q_page_size']}, q_name=${filter['q_name']}, q_guard=${filter['q_guard']}, q_method=${filter['q_method']}, q_status=${filter['q_status']}, q_desc=${filter['q_desc']})}">
                Previous
              </a>
            </li>
            <li th:each="i : ${#numbers.sequence(1, paginate.totalPage)}"
                th:classappend="${i == paginate.currentPage} ? 'active'"
                class="page-item">
              <a class="page-link"
                 th:href="@{/admin/v1/access/permissions(q_page=${i}, q_page_size=${filter['q_page_size']}, q_name=${filter['q_name']}, q_guard=${filter['q_guard']}, q_method=${filter['q_method']}, q_status=${filter['q_status']}, q_desc=${filter['q_desc']})}"
                 th:text="${i}"></a>
            </li>
            <li th:if="${paginate.currentPage != paginate.totalPage and paginate.totalPage != 0}"
                class="page-item">
              <a class="page-link"
                 th:href="@{/admin/v1/access/permissions(q_page=${paginate.currentPage + 1}, q_page_size=${filter['q_page_size']}, q_name=${filter['q_name']}, q_guard=${filter['q_guard']}, q_method=${filter['q_method']}, q_status=${filter['q_status']}, q_desc=${filter['q_desc']})}">
                Next
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>

  <script th:inline="none">
    $("#checkall").click(function () {
      $('input:checkbox').not(this).prop('checked', this.checked);
    });
  </script>

</div>
</body>
</html>
