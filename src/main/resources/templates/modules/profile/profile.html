<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/be/default/main}">
<head>
  <title>Profile</title>
</head>
<body>
<div layout:fragment="content">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Profile</h1>
  </div>

  <div class="tw-card p-6">
    <h2 class="text-lg font-bold mb-4" style="color:var(--primary)">User Form</h2>

    <form method="post"
          th:action="@{/admin/v1/profile/update}"
          enctype="multipart/form-data">
      <input type="hidden" name="_method" value="PUT"/>

      <!-- Code -->
      <div class="mb-3">
        <label for="code" class="form-label fw-semibold">Code</label>
        <input id="code" type="text" name="code"
               th:value="${data.code}"
               class="form-control">
      </div>

      <!-- Name -->
      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Name</label>
        <input id="name" type="text" name="name"
               th:value="${data.name}"
               class="form-control">
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label for="phone" class="form-label fw-semibold">Phone Number</label>
        <input id="phone" type="text" name="phone"
               th:value="${data.phone}"
               class="form-control">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input id="email" type="email" name="email"
               th:value="${data.email}"
               class="form-control">
      </div>

      <!-- Timezone -->
      <div class="mb-3">
        <label for="timezone" class="form-label fw-semibold">Timezone</label>
        <select id="timezone" name="timezone" class="form-control">
          <option th:each="tz : ${timezones}"
                  th:value="${tz}"
                  th:text="${tz}"
                  th:selected="${data.timezone == tz}"></option>
        </select>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">
          Password <small class="text-muted">(leave blank to keep current)</small>
        </label>
        <input id="password" type="password" name="password" value=""
               autocomplete="new-password" class="form-control">
      </div>

      <!-- Password Confirmation -->
      <div class="mb-3">
        <label for="passwordConfirmation" class="form-label fw-semibold">Password Confirm</label>
        <input id="passwordConfirmation" type="password" name="passwordConfirmation"
               value="" class="form-control">
      </div>

      <!-- Status -->
      <div class="mb-3">
        <label for="status" class="form-label fw-semibold">Status</label>
        <select id="status" name="status" class="form-control" required>
          <option value="Active"   th:selected="${data.status == 'Active'}">Active</option>
          <option value="Inactive" th:selected="${data.status == 'Inactive'}">Inactive</option>
        </select>
      </div>

      <!-- Picture -->
      <div class="mb-4">
        <label for="picture" class="form-label fw-semibold">Picture</label>
        <div class="d-flex align-items-center gap-3">
          <img id="picturePreview"
               th:src="${data.picture != null ? storageUrl.url(data.picture) : '/public/modules/access/user/user.png'}"
               width="90" height="90"
               class="rounded border p-1"
               style="object-fit:contain;background:#f8fafc"
               onerror="this.style.visibility='hidden'">
          <input id="picture" type="file" name="picture" accept="image/*" class="form-control">
        </div>
      </div>

      <button type="submit" class="btn btn-primary-tw px-4 py-2">
        <i class="fas fa-save me-1"></i> Save
      </button>
    </form>
  </div>

  <script th:inline="none">
    // Preview picture before submit
    (function() {
      var input = document.getElementById('picture');
      var prev  = document.getElementById('picturePreview');
      if (!input || !prev) { return; }
      input.addEventListener('change', function() {
        var f = this.files && this.files[0];
        if (f && f.type.startsWith('image/')) {
          prev.src = URL.createObjectURL(f);
          prev.style.visibility = 'visible';
        }
      });
    })();
  </script>

</div>
</body>
</html>
