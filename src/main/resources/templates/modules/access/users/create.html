<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/be/default/main}">
<head>
  <title>Create User</title>
</head>
<body>
<div layout:fragment="content">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">User Management</h1>
  </div>

  <div class="tw-card p-6">
    <h2 class="text-lg font-bold mb-4" style="color:var(--primary)">User Form</h2>

    <form method="post" th:action="@{/admin/v1/access/users}" enctype="multipart/form-data" th:object="${form}">

      <!-- Code -->
      <div class="mb-3">
        <label for="code" class="form-label fw-semibold">Code</label>
        <input id="code" type="text" name="code"
               th:value="${form.code}"
               th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('code')}" class="invalid-feedback"
             th:errors="*{code}"></div>
      </div>

      <!-- Name -->
      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Name</label>
        <input id="name" type="text" name="name"
               th:value="${form.name}"
               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback"
             th:errors="*{name}"></div>
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label for="phone" class="form-label fw-semibold">Phone Number</label>
        <input id="phone" type="text" name="phone"
               th:value="${form.phone}"
               th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('phone')}" class="invalid-feedback"
             th:errors="*{phone}"></div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input id="email" type="email" name="email"
               th:value="${form.email}"
               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback"
             th:errors="*{email}"></div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input id="password" type="password" name="password" value=""
               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('password')}" class="invalid-feedback"
             th:errors="*{password}"></div>
      </div>

      <!-- Password Confirmation -->
      <div class="mb-3">
        <label for="password_confirmation" class="form-label fw-semibold">Password Confirm</label>
        <input id="password_confirmation" type="password" name="passwordConfirmation" value=""
               th:classappend="${#fields.hasErrors('passwordConfirmation')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('passwordConfirmation')}" class="invalid-feedback"
             th:errors="*{passwordConfirmation}"></div>
      </div>

      <!-- Timezone -->
      <div class="mb-3">
        <label for="timezone" class="form-label fw-semibold">Timezone</label>
        <select id="timezone" name="timezone"
                th:classappend="${#fields.hasErrors('timezone')} ? 'is-invalid'"
                class="form-control">
          <option th:each="tz : ${timezones}"
                  th:value="${tz}"
                  th:text="${tz}"
                  th:selected="${form.timezone == tz}"></option>
        </select>
        <div th:if="${#fields.hasErrors('timezone')}" class="invalid-feedback"
             th:errors="*{timezone}"></div>
      </div>

      <!-- Status -->
      <div class="mb-3">
        <label for="status" class="form-label fw-semibold">Status</label>
        <select id="status" name="status" required
                th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'"
                class="form-control">
          <option value="Active"   th:selected="${form.status == 'Active' or form.status == null}">Active</option>
          <option value="Inactive" th:selected="${form.status == 'Inactive'}">Inactive</option>
        </select>
        <div th:if="${#fields.hasErrors('status')}" class="invalid-feedback"
             th:errors="*{status}"></div>
      </div>

      <!-- Picture -->
      <div class="mb-3">
        <label for="picture" class="form-label fw-semibold">Picture</label>
        <div class="preview mb-3" id="preview">
          <img src="/public/modules/access/user/user.png" style="max-width:160px" class="rounded border p-1">
        </div>
        <input id="picture" type="file" name="picture" class="form-control"
               th:classappend="${#fields.hasErrors('picture')} ? 'is-invalid'"
               onchange="previewImage(event)">
        <div th:if="${#fields.hasErrors('picture')}" class="text-danger small mt-1"
             th:errors="*{picture}"></div>
      </div>

      <!-- Blocked -->
      <div class="mb-3">
        <label class="form-label fw-semibold d-block">Blocked</label>
        <div class="d-flex flex-wrap gap-3 p-2 rounded border">
          <label class="d-flex align-items-center gap-2">
            <input id="blocked" type="checkbox" name="blocked" value="1"
                   th:checked="${form.blocked}"
                   class="w-4 h-4">
            <span>Blokir akun</span>
          </label>
        </div>
      </div>

      <!-- Blocked Reason -->
      <div class="mb-3" id="div_blocked_reason">
        <label for="blocked_reason" class="form-label fw-semibold">Blocked Reason</label>
        <input id="blocked_reason" type="text" name="blocked_reason"
               th:value="${form.blockedReason}"
               th:classappend="${#fields.hasErrors('blockedReason')} ? 'is-invalid'"
               class="form-control">
        <div th:if="${#fields.hasErrors('blockedReason')}" class="invalid-feedback"
             th:errors="*{blockedReason}"></div>
      </div>

      <!-- Roles -->
      <div class="mb-4">
        <label class="form-label fw-semibold d-block">Role</label>
        <div class="d-flex flex-wrap gap-3 p-2 rounded border"
             th:classappend="${#fields.hasErrors('roles')} ? 'border-danger'">
          <label th:each="role, iterStat : ${roles}"
                 class="d-flex align-items-center gap-2">
            <input th:id="'roles' + ${iterStat.index}"
                   type="checkbox" name="roles[]" th:value="${role.id}"
                   class="w-4 h-4">
            <span th:text="${role.name}"></span>
          </label>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary-tw px-4 py-2">
          <i class="fas fa-save me-1"></i> Save
        </button>
        <a th:href="@{/admin/v1/access/users}" class="btn btn-danger px-4 py-2 text-white">Back</a>
      </div>

    </form>
  </div>

  <script th:inline="none">
    function previewImage(event) {
      var preview = document.getElementById('preview');
      preview.innerHTML = '';
      var file = event.target.files[0];
      if (file) {
        var reader = new FileReader();
        reader.onload = function (e) {
          var img = document.createElement('img');
          img.src = e.target.result;
          img.style.maxWidth = '160px';
          img.className = 'rounded border p-1';
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML = '<p class="text-muted">No image selected</p>';
      }
    }
    $(document).ready(function () {
      $('#div_blocked_reason').toggle($('#blocked').is(':checked'));
      $('#blocked').click(function () {
        if (this.checked) {
          $('#div_blocked_reason').show();
        } else {
          $('#blocked_reason').val('');
          $('#div_blocked_reason').hide();
        }
      });
    });
  </script>

</div>
</body>
</html>
