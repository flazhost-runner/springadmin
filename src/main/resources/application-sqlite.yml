spring:
  session:
    store-type: none

  data:
    redis:
      url: redis://localhost:6379

  datasource:
    # DB_DATABASE opsional = path file sqlite (container menimpa via SPRING_DATASOURCE_URL).
    url: jdbc:sqlite:${DB_DATABASE:./springadmin.db}
    driver-class-name: org.sqlite.JDBC
    username:
    password:
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA foreign_keys = ON; PRAGMA journal_mode = WAL;"

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

  thymeleaf:
    cache: false

logging:
  file:
    name: springadmin.log
  level:
    com.nodeadmin: DEBUG

app:
  env: development
